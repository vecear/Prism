<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Prism</title>
  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <!-- iOS Web App -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Prism">
  <meta name="theme-color" content="#0e1117">
  <link rel="manifest" href="manifest.json">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+TC:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header class="site-header">
      <div class="logo">
        <svg class="logo-icon" viewBox="0 0 28 28" fill="none">
          <polygon points="14,2 26,26 2,26" fill="none" stroke="url(#prism-g)" stroke-width="2.5" stroke-linejoin="round"/>
          <line x1="14" y1="2" x2="8" y2="26" stroke="#00b4d8" stroke-width="1.5" opacity=".5"/>
          <line x1="14" y1="2" x2="20" y2="26" stroke="#ffd600" stroke-width="1.5" opacity=".5"/>
          <defs><linearGradient id="prism-g" x1="0" y1="0" x2="28" y2="28"><stop offset="0%" stop-color="#00b4d8"/><stop offset="50%" stop-color="#ffd600"/><stop offset="100%" stop-color="#ff1744"/></linearGradient></defs>
        </svg>
        <h1>Prism</h1>
      </div>
      <div class="header-right">
        <div id="header-auth"></div>
        <button class="settings-btn" id="btn-settings" title="設定">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 01-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- Settings Panel -->
    <div class="settings-overlay" id="settings-overlay"></div>
    <div class="settings-panel" id="settings-panel">
      <div class="settings-header">
        <h3><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 01-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>設定</h3>
        <button class="settings-close" id="btn-settings-close" aria-label="關閉設定">&times;</button>
      </div>
      <div class="settings-body" id="settings-body"></div>
    </div>

    <!-- Market Ticker Strip -->
    <div class="ticker-bar">
      <div class="ticker-strip" id="ticker-inputs"></div>
      <button class="ticker-toggle" id="btn-ticker-toggle" aria-label="展開報價">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
      </button>
      <button class="ticker-refresh" id="btn-fetch-indices" title="更新報價">
        <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M1 4v6h6"/><path d="M23 20v-6h-6"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/></svg>
        <span class="ticker-time" id="ticker-time"></span>
      </button>
    </div>

    <!-- Sentiment Strip -->
    <div class="sentiment-strip" id="sentiment-strip" style="display:none"></div>

    <!-- Main Tabs -->
    <nav class="main-tabs">
      <button class="main-tab active" data-tab="margin">
        <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M2 17l10-10M12 7l10 10"/><path d="M5 3v4M19 17v4"/><circle cx="5" cy="7" r="1.5" fill="currentColor" stroke="none"/><circle cx="19" cy="17" r="1.5" fill="currentColor" stroke="none"/></svg>
        <span class="tab-label">股票</span>
      </button>
      <button class="main-tab" data-tab="futures">
        <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 3v18"/><path d="M14 14l3-3m0 0l3 3m-3-3v6"/></svg>
        <span class="tab-label">期貨</span>
      </button>
      <button class="main-tab" data-tab="options">
        <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 3v18M3 12h18"/><path d="M5.6 5.6l12.8 12.8M18.4 5.6L5.6 18.4"/></svg>
        <span class="tab-label">選擇權</span>
      </button>
      <button class="main-tab" data-tab="journal">
        <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="9" y1="15" x2="15" y2="15"/><line x1="12" y1="12" x2="12" y2="18"/></svg>
        <span class="tab-label">紀錄</span>
      </button>
      <button class="main-tab" data-tab="guide">
        <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 015.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        <span class="tab-label">說明</span>
      </button>
    </nav>

    <!-- Tab Contents -->
    <main class="main-content">

      <!-- MARGIN TAB -->
      <section id="tab-margin" class="tab-content active">
        <div class="controls-bar">
          <div class="toggle-group" data-group="margin-market">
            <button class="toggle-btn active" data-value="tw">台灣</button>
            <button class="toggle-btn" data-value="us">美國</button>
          </div>
          <div class="toggle-group direction-toggle" data-group="margin-direction">
            <button class="toggle-btn active" data-value="cash">現股</button>
            <button class="toggle-btn" data-value="long">融資 Long</button>
            <button class="toggle-btn" data-value="short">融券 Short</button>
          </div>
          <div class="toggle-group" data-group="margin-product">
            <button class="toggle-btn active" data-value="stock">個股</button>
            <button class="toggle-btn" data-value="etf">指數ETF</button>
            <button class="toggle-btn" data-value="letf">槓桿ETF</button>
          </div>
        </div>
        <div class="calc-layout">
          <div class="input-panel card">
            <div id="margin-inputs"></div>
          </div>
          <div class="result-panel">
            <div id="margin-results"></div>
          </div>
        </div>
      </section>

      <!-- FUTURES TAB -->
      <section id="tab-futures" class="tab-content">
        <div class="controls-bar">
          <div class="toggle-group" data-group="futures-market">
            <button class="toggle-btn active" data-value="tw">台灣</button>
            <button class="toggle-btn" data-value="us">美國</button>
          </div>
          <div class="toggle-group direction-toggle" data-group="futures-direction">
            <button class="toggle-btn active" data-value="long">做多 Buy</button>
            <button class="toggle-btn" data-value="short">做空 Sell</button>
          </div>
          <div class="toggle-group" data-group="futures-product">
            <button class="toggle-btn active" data-value="index">指數</button>
            <button class="toggle-btn" data-value="stock">股票</button>
          </div>
        </div>
        <div class="calc-layout">
          <div class="input-panel card">
            <div id="futures-inputs"></div>
          </div>
          <div class="result-panel">
            <div id="futures-results"></div>
          </div>
        </div>
      </section>

      <!-- OPTIONS TAB -->
      <section id="tab-options" class="tab-content">
        <div class="controls-bar">
          <div class="toggle-group" data-group="options-market">
            <button class="toggle-btn active" data-value="tw">台灣</button>
            <button class="toggle-btn" data-value="us">美國</button>
          </div>
          <div class="toggle-group direction-toggle" data-group="options-side">
            <button class="toggle-btn active" data-value="buyer">買方 Buyer</button>
            <button class="toggle-btn" data-value="seller">賣方 Seller</button>
          </div>
          <div class="toggle-group" data-group="options-product">
            <button class="toggle-btn active" data-value="index">指數</button>
            <button class="toggle-btn" data-value="stock">個股</button>
          </div>
        </div>
        <div class="calc-layout">
          <div class="input-panel card">
            <div id="options-inputs"></div>
          </div>
          <div class="result-panel">
            <div id="options-results"></div>
          </div>
        </div>
      </section>

      <!-- JOURNAL TAB -->
      <section id="tab-journal" class="tab-content">
        <div id="journal-root"></div>
      </section>

      <!-- GUIDE TAB -->
      <section id="tab-guide" class="tab-content">
        <div id="guide-content"></div>
      </section>

    </main>

    <footer class="site-footer">
      <p>Prism &mdash; 僅供參考，實際規則以各券商/期貨商公告為準</p>
    </footer>
  </div>
  <script>
  // Generate apple-touch-icon PNG from canvas (iOS requires PNG)
  (function(){
    var s = [180, 192, 512];
    s.forEach(function(sz){
      var c = document.createElement('canvas'); c.width = sz; c.height = sz;
      var x = c.getContext('2d'), r = sz * 0.1875;
      // Rounded rect background
      x.beginPath(); x.moveTo(r,0); x.lineTo(sz-r,0); x.quadraticCurveTo(sz,0,sz,r);
      x.lineTo(sz,sz-r); x.quadraticCurveTo(sz,sz,sz-r,sz); x.lineTo(r,sz);
      x.quadraticCurveTo(0,sz,0,sz-r); x.lineTo(0,r); x.quadraticCurveTo(0,0,r,0);
      x.closePath(); x.fillStyle='#0e1117'; x.fill();
      // Triangle
      var cx=sz/2, top=sz*0.14, bot=sz*0.86, left=sz*0.14, right=sz*0.86;
      var g = x.createLinearGradient(0,0,sz,sz);
      g.addColorStop(0,'#00b4d8'); g.addColorStop(0.5,'#ffd600'); g.addColorStop(1,'#ff1744');
      x.strokeStyle=g; x.lineWidth=sz*0.062; x.lineJoin='round';
      x.beginPath(); x.moveTo(cx,top); x.lineTo(right,bot); x.lineTo(left,bot); x.closePath(); x.stroke();
      // Refraction lines
      x.globalAlpha=0.4;
      x.strokeStyle='#00b4d8'; x.lineWidth=sz*0.03;
      x.beginPath(); x.moveTo(cx,top); x.lineTo(sz*0.31,bot); x.stroke();
      x.strokeStyle='#ffd600';
      x.beginPath(); x.moveTo(cx,top); x.lineTo(sz*0.69,bot); x.stroke();
      x.globalAlpha=1;
      // Inject as link
      var url = c.toDataURL('image/png');
      if(sz === 180){ var l=document.createElement('link'); l.rel='apple-touch-icon'; l.href=url; document.head.appendChild(l); }
      if(sz === 192 || sz === 512){
        // Also save for manifest (browsers cache from link tags)
        var l2=document.createElement('link'); l2.rel='icon'; l2.type='image/png'; l2.sizes=sz+'x'+sz; l2.href=url; document.head.appendChild(l2);
      }
    });
  })();
  </script>
  <script src="js/app.js"></script>
  <script src="js/journal.js"></script>
</body>
</html>
