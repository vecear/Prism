  <script>
  // Apply theme early to prevent flash
  (function(){
    try {
      var s = JSON.parse(localStorage.getItem('tg-settings'));
      var theme = (s && s.theme) || 'paper';
      // Migrate old theme keys
      if (theme === 'warm' || theme === 'light') theme = 'paper';
      document.documentElement.setAttribute('data-theme', theme);
      if (s && s.colorMode === 'red-up') {
        // Swap green/red variables for 紅漲綠跌
        var e = document.documentElement.style;
        var cs = getComputedStyle(document.documentElement);
        var g = cs.getPropertyValue('--green').trim();
        var r = cs.getPropertyValue('--red').trim();
        var gs = cs.getPropertyValue('--green-soft').trim();
        var rs = cs.getPropertyValue('--red-soft').trim();
        e.setProperty('--green', r); e.setProperty('--red', g);
        e.setProperty('--green-soft', rs); e.setProperty('--red-soft', gs);
      }
    } catch (e) {}
  })();

  // Generate apple-touch-icon PNG — deferred
  (function(){
    var gen = function() {
      var sz = 180;
      var c = document.createElement('canvas'); c.width = sz; c.height = sz;
      var x = c.getContext('2d'), r = sz * 0.1875;
      x.beginPath(); x.moveTo(r,0); x.lineTo(sz-r,0); x.quadraticCurveTo(sz,0,sz,r);
      x.lineTo(sz,sz-r); x.quadraticCurveTo(sz,sz,sz-r,sz); x.lineTo(r,sz);
      x.quadraticCurveTo(0,sz,0,sz-r); x.lineTo(0,r); x.quadraticCurveTo(0,0,r,0);
      x.closePath(); x.fillStyle='#faf7f0'; x.fill();
      var cx=sz/2, top=sz*0.14, bot=sz*0.86, left=sz*0.14, right=sz*0.86;
      x.strokeStyle='#c2410c'; x.lineWidth=sz*0.062; x.lineJoin='round';
      x.beginPath(); x.moveTo(cx,top); x.lineTo(right,bot); x.lineTo(left,bot); x.closePath(); x.stroke();
      x.globalAlpha=0.35;
      x.beginPath(); x.moveTo(cx,top); x.lineTo(sz*0.31,bot); x.stroke();
      x.beginPath(); x.moveTo(cx,top); x.lineTo(sz*0.69,bot); x.stroke();
      var url = c.toDataURL('image/png');
      var l=document.createElement('link'); l.rel='apple-touch-icon'; l.href=url; document.head.appendChild(l);
    };
