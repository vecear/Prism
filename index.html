      </button>
      <button class="main-tab" data-tab="options">

    <!-- Tab Contents -->
    <main class="main-content">

      <!-- MARGIN TAB -->

              <div class="toggle-group direction-toggle" data-group="margin-direction">
                <button class="toggle-btn active" data-value="cash">現股</button>

            </div>

          </div>

        </div>

      <!-- FUTURES TAB -->
      <section id="tab-futures" class="tab-content">

          <div class="calc-left">
            <div class="controls-bar">
              <div class="toggle-group" data-group="futures-market">

            <div class="input-panel card">

            </div>
          </div>
          <div class="result-panel">

          </div>
        </div>

      <!-- OPTIONS TAB -->
      <section id="tab-options" class="tab-content">

          <div class="calc-left">
            <div class="controls-bar">

                <button class="toggle-btn" data-value="seller">賣方 Seller</button>
              </div>
              <div class="toggle-group" data-group="options-product">
                <button class="toggle-btn active" data-value="index">指數</button>
                <button class="toggle-btn" data-value="stock">個股</button>

            </div>

      <section id="tab-settings" class="tab-content">
        <div class="settings-body" id="settings-body"></div>

  <script>
  // Apply theme & color mode early to prevent flash
  (function(){try{var s=JSON.parse(localStorage.getItem('tg-settings'));if(s&&s.theme&&s.theme!=='dark')document.documentElement.setAttribute('data-theme',s.theme);if(s&&s.colorMode==='red-up'){var TC={dark:{g:'#00c853',gd:'rgba(0,200,83,.08)',r:'#ff1744',rd:'rgba(255,23,68,.08)'},light:{g:'#16a34a',gd:'rgba(22,163,74,.06)',r:'#dc2626',rd:'rgba(220,38,38,.06)'},midnight:{g:'#22c55e',gd:'rgba(34,197,94,.08)',r:'#ef4444',rd:'rgba(239,68,68,.08)'},emerald:{g:'#34d399',gd:'rgba(52,211,153,.10)',r:'#f43f5e',rd:'rgba(244,63,94,.10)'},warm:{g:'#22c55e',gd:'rgba(34,197,94,.10)',r:'#ef4444',rd:'rgba(239,68,68,.10)'}};var t=TC[s.theme||'dark']||TC.dark;var e=document.documentElement.style;e.setProperty('--green',t.r);e.setProperty('--green-d',t.rd);e.setProperty('--red',t.g);e.setProperty('--red-d',t.gd);}}catch{}})();
  // Generate apple-touch-icon PNG from canvas (iOS requires PNG) — deferred
  (function(){
    var gen = function() {
    var s = [180];
    s.forEach(function(sz){
      var c = document.createElement('canvas'); c.width = sz; c.height = sz;
      var x = c.getContext('2d'), r = sz * 0.1875;
      // Rounded rect background
      x.beginPath(); x.moveTo(r,0); x.lineTo(sz-r,0); x.quadraticCurveTo(sz,0,sz,r);
      x.lineTo(sz,sz-r); x.quadraticCurveTo(sz,sz,sz-r,sz); x.lineTo(r,sz);
      x.quadraticCurveTo(0,sz,0,sz-r); x.lineTo(0,r); x.quadraticCurveTo(0,0,r,0);
      x.closePath(); x.fillStyle='#0e1117'; x.fill();
      // Triangle
      var cx=sz/2, top=sz*0.14, bot=sz*0.86, left=sz*0.14, right=sz*0.86;
      var g = x.createLinearGradient(0,0,sz,sz);
      g.addColorStop(0,'#00b4d8'); g.addColorStop(0.5,'#ffd600'); g.addColorStop(1,'#ff1744');
      x.strokeStyle=g; x.lineWidth=sz*0.062; x.lineJoin='round';
      x.beginPath(); x.moveTo(cx,top); x.lineTo(right,bot); x.lineTo(left,bot); x.closePath(); x.stroke();
      // Refraction lines
      x.globalAlpha=0.4;
      x.strokeStyle='#00b4d8'; x.lineWidth=sz*0.03;
      x.beginPath(); x.moveTo(cx,top); x.lineTo(sz*0.31,bot); x.stroke();
      x.strokeStyle='#ffd600';
      x.beginPath(); x.moveTo(cx,top); x.lineTo(sz*0.69,bot); x.stroke();
      x.globalAlpha=1;
      // Inject as link
      var url = c.toDataURL('image/png');
      if(sz === 180){ var l=document.createElement('link'); l.rel='apple-touch-icon'; l.href=url; document.head.appendChild(l); }
    });
    };
    if ('requestIdleCallback' in window) { requestIdleCallback(gen); } else { setTimeout(gen, 100); }
  })();
  </script>
  <script>
  // Register Service Worker for PWA offline support (skip on localhost for dev hot-reload)
  if ('serviceWorker' in navigator) {
    if (location.hostname === 'localhost' || location.hostname === '127.0.0.1') {
      navigator.serviceWorker.getRegistrations().then(function(regs) {
        regs.forEach(function(r) { r.unregister(); });
      });
    } else {
      navigator.serviceWorker.register('/sw.js').then(function(reg) {
        reg.addEventListener('updatefound', function() {
          var nw = reg.installing;
          if (!nw) return;
          nw.addEventListener('statechange', function() {
            if (nw.state === 'activated' && navigator.serviceWorker.controller) {
              // New version activated — prompt reload
              var bar = document.createElement('div');
              bar.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:99999;background:var(--accent,#00b4d8);color:#fff;text-align:center;padding:10px 16px;font-size:14px;cursor:pointer;font-family:sans-serif';
              bar.textContent = '已更新至新版本，點擊重新載入';
              bar.onclick = function() { location.reload(); };
              document.body.appendChild(bar);
            }
          });
        });
      }).catch(function(){});
    }
  }
  </script>
